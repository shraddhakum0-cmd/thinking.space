<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:white;}

nav{
display:flex;justify-content:space-between;padding:15px 30px;
background:#111;position:fixed;width:100%;top:0;z-index:1000;
}
nav h2{color:#ffd700;}
nav a{color:white;text-decoration:none;margin:0 10px;}

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1498654896293-37aacf113fd9?auto=format&fit=crop&w=1920") center/cover no-repeat;
display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
}

section{padding:100px 20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1c1c1c;border-radius:15px;overflow:hidden;transition:0.3s;
}
.card:hover{transform:scale(1.05);}

.card img{width:100%;height:200px;object-fit:cover;}

.card-content{padding:15px;}

button{
background:#ffd700;border:none;padding:8px 15px;border-radius:20px;cursor:pointer;
}

/* Confession */
.confession-box textarea{
width:100%;height:100px;border-radius:10px;border:none;padding:10px;
}

/* AI */
.ai-box{
background:#1c1c1c;padding:15px;border-radius:10px;
}
.ai-box input{
width:100%;padding:10px;border-radius:20px;border:none;margin-top:10px;
}
</style>
</head>

<body>

<nav>
<h2>Luxury Hub</h2>
<div>
<a href="#anime">Anime</a>
<a href="#games">Games</a>
<a href="#movies">Movies</a>
<a href="#confession">Confession</a>
<a href="#ai">AI</a>
</div>
</nav>

<div class="hero">
<h1>Welcome to Luxury Hub</h1>
<p>Entertainment + Confession + AI</p>
</div>

<!-- ANIME -->
<section id="anime">
<h2>Anime</h2>
<div class="grid" id="animeList"></div>
</section>

<!-- GAMES -->
<section id="games">
<h2>Games</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1611996575749-79a3a250f948?auto=format&fit=crop&w=800">
<div class="card-content">
<h3>Chess</h3>
<p>2M+ players</p>
<button>Play</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606092195730-5d7b9af1efc5?auto=format&fit=crop&w=800">
<div class="card-content">
<h3>Ludo</h3>
<p>5M+ players</p>
<button>Play</button>
</div>
</div>

</div>
</section>

<!-- MOVIES -->
<section id="movies">
<h2>Movies</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?auto=format&fit=crop&w=800">
<div class="card-content">
<h3>Latest Movie</h3>
<p>2025</p>
<button>Watch</button>
</div>
</div>

</div>
</section>

<!-- CONFESSION -->
<section id="confession">
<h2>Confession Zone 😈</h2>

<div class="confession-box">
<textarea placeholder="Apna confession likho..."></textarea>
<br><br>
<button onclick="sendConfession()">Send</button>

<p style="margin-top:15px;color:#aaa;">
📩 DM on Instagram: 
<a href="https://instagram.com/yourr.akuma_.09" target="_blank" style="color:#ffd700;">
<b>@yourr.akuma_.09</b>
</a>
</p>

<br>

<a href="https://instagram.com/yourr.akuma_.09" target="_blank">
<button>Send Confession on Instagram</button>
</a>

</div>
</section>

<!-- AI -->
<section id="ai">
<h2>AI Chat 🤖</h2>

<div class="ai-box">
<div id="chatBox"></div>
<input type="text" placeholder="AI se baat karo..." onkeypress="handleChat(event)">
</div>

</section>

<script>
const animeData=[
{name:"Naruto",img:"https://cdn.myanimelist.net/images/anime/13/17405.jpg"},
{name:"Attack on Titan",img:"https://cdn.myanimelist.net/images/anime/10/47347.jpg"},
{name:"Demon Slayer",img:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg"}
];

function loadAnime(){
let html="";
animeData.forEach(a=>{
html+=`
<div class="card">
<img src="${a.img}">
<div class="card-content">
<h3>${a.name}</h3>
<button>Watch</button>
</div>
</div>`;
});
document.getElementById("animeList").innerHTML=html;
}
loadAnime();

function sendConfession(){
alert("Confession sent 😈 (demo)");
}

function handleChat(e){
if(e.key==="Enter"){
let input=e.target.value;
let chatBox=document.getElementById("chatBox");

chatBox.innerHTML+=`<p><b>You:</b> ${input}</p>`;

let reply="Hmm interesting 👀";
if(input.toLowerCase().includes("hi")) reply="Hello 😄";
if(input.toLowerCase().includes("sad")) reply="Don't worry ❤️";

chatBox.innerHTML+=`<p><b>AI:</b> ${reply}</p>`;

e.target.value="";
}
}
</script>

</body>
</html>
