<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Hub Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0f0f0f;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#111;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

/* LOGIN */
#auth{
display:flex;
flex-direction:column;
align-items:center;
margin-top:100px;
}
input{
margin:5px;
padding:10px;
border-radius:20px;
border:none;
}

/* BUTTON */
button{
background:#ffd700;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* MAIN HIDE */
#main{display:none;}

/* CARDS */
.row{
display:flex;
overflow-x:auto;
gap:10px;
}
.card{
min-width:200px;
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
}
.card img{width:100%;height:250px;object-fit:cover;}
</style>
</head>

<body>

<nav>
<h2>Luxury Hub 😈</h2>
</nav>

<!-- LOGIN -->
<div id="auth">
<h2>Login / Signup</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- MAIN WEBSITE -->
<div id="main">

<h2>🔥 Welcome</h2>

<!-- CONFESSION -->
<h3>😈 Confession</h3>
<textarea id="confessionText"></textarea><br>
<button onclick="sendConfession()">Send</button>

<div id="confessions"></div>

<!-- AI -->
<h3>🤖 AI Chat</h3>
<input id="chatInput" placeholder="Type..." onkeypress="chat(event)">
<div id="chatBox"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// SIGNUP
function signup(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,pass)
.then(()=>alert("Signup Success 😈"));
}

// LOGIN
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
document.getElementById("auth").style.display="none";
document.getElementById("main").style.display="block";
loadConfessions();
});
}

// SAVE CONFESSION
function sendConfession(){
let text=document.getElementById("confessionText").value;

db.collection("confessions").add({
text:text,
time:new Date()
});

alert("Saved 😈");
}

// LOAD CONFESSION
function loadConfessions(){
db.collection("confessions").orderBy("time","desc")
.onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
html+=`<p>😈 ${doc.data().text}</p>`;
});
document.getElementById("confessions").innerHTML=html;
});
}

// AI CHAT (API READY)
function chat(e){
if(e.key==="Enter"){
let msg=e.target.value;

document.getElementById("chatBox").innerHTML+=`<p>You: ${msg}</p>`;

// future API connect here
document.getElementById("chatBox").innerHTML+=`<p>AI: thinking...</p>`;

e.target.value="";
}
}
</script>

</body>
</html>
